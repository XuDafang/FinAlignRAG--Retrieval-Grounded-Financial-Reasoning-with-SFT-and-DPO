# FinAlignRAG - model, retrieval, SFT, and DPO configuration

project:
  name: FinAlignRAG
  seed: 42

models:
  base_model: Qwen/Qwen2.5-7B-Instruct
  embedding_model: BAAI/bge-large-en-v1.5
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2

data:
  processed_dir: data/processed
  sft_dir: data/sft
  dpo_dir: data/dpo

retrieval:
  index_type: IndexFlatIP
  normalize_l2: true
  top_k_dense: 15
  top_k_rerank: 5

training:
  output_dir: outputs
  sft_adapter_dir: outputs/sft_adapter
  dpo_adapter_dir: outputs/dpo_adapter

  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

  learning_rate: 2.0e-4
  batch_size: 1
  gradient_accumulation_steps: 16
  max_seq_length: 1024
  inference_max_seq_length: 2048
  logging_steps: 10
  max_steps: 1500
  seed: 42

  gradient_checkpointing: true

  debug:
    max_steps: 5

  dpo:
    beta: 0.1
    max_steps: 400

eval:
  numerical_tolerance: 0.001
  retrieval_recall_k: 5
  report_path: reports/ablation_results.json
